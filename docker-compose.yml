version: "3.9"

networks:
  trading-net:
    driver: bridge

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading-net
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - trading-net

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app worker --loglevel=info -Q default,ml,ingestion
    depends_on:
      - postgres
      - redis
    networks:
      - trading-net
    env_file:
      - .env

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app beat --loglevel=info
    depends_on:
      - postgres
      - redis
    networks:
      - trading-net
    env_file:
      - .env

  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
    networks:
      - trading-net
    env_file:
      - .env

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - trading-net
    env_file:
      - .env
    volumes:
      - .:/app

  # ── Kafka (event bus for real-time streaming) ────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - trading-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - trading-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - trading-net

  # ── Flink cluster ─────────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.19-scala_2.12-java11
    command: jobmanager
    ports:
      - "8081:8081"    # Flink UI
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INFERENCE_SERVER_URL: http://api:8000/internal/inference
    volumes:
      - ./flink-kotlin/target:/opt/flink/usrlib   # mount compiled jar
    depends_on:
      - kafka
    networks:
      - trading-net

  flink-taskmanager:
    image: flink:1.19-scala_2.12-java11
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INFERENCE_SERVER_URL: http://api:8000/internal/inference
    depends_on:
      - flink-jobmanager
    networks:
      - trading-net

  # ── Event producers (feed Kafka from WebSocket streams) ───────────────────
  price-producer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m backend.producers.price_producer
    depends_on:
      - kafka
    networks:
      - trading-net
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  news-producer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m backend.producers.news_producer
    depends_on:
      - kafka
    networks:
      - trading-net
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

volumes:
  postgres_data:
