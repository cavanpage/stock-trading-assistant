version: "3.9"

networks:
  trading-net:
    driver: bridge

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading-net
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - trading-net

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app worker --loglevel=info -Q default,ml,ingestion
    depends_on:
      - postgres
      - redis
    networks:
      - trading-net
    env_file:
      - .env

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app beat --loglevel=info
    depends_on:
      - postgres
      - redis
    networks:
      - trading-net
    env_file:
      - .env

  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
    networks:
      - trading-net
    env_file:
      - .env

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - trading-net
    env_file:
      - .env
    volumes:
      - .:/app

volumes:
  postgres_data:
